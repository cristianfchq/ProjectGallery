<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9ff"/>
      <stop offset="100%" style="stop-color:#e8eaf6"/>
    </linearGradient>
    <linearGradient id="shoe1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8eaf6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="295" rx="120" ry="18" fill="rgba(0,0,0,0.12)"/>
  <!-- Sole -->
  <path d="M80 270 Q90 285 200 288 Q310 285 330 270 L325 260 Q310 272 200 275 Q90 272 85 260 Z" fill="#e0e0e0"/>
  <!-- Air unit -->
  <rect x="85" y="255" width="50" height="18" rx="5" fill="#90caf9" opacity="0.8"/>
  <!-- Main upper -->
  <path d="M85 260 Q95 220 140 205 Q180 195 230 200 Q280 205 320 220 L330 260 Q310 272 200 275 Q90 272 85 260 Z" fill="url(#shoe1)" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Toe box -->
  <path d="M85 260 Q88 235 110 218 Q130 208 155 205 Q160 225 140 240 Q110 248 85 260 Z" fill="#f5f5f5"/>
  <!-- Laces area -->
  <path d="M155 205 Q195 198 245 202 Q255 215 250 235 Q210 228 165 232 Q158 220 155 205 Z" fill="#fafafa"/>
  <!-- Laces -->
  <line x1="170" y1="210" x2="240" y2="208" stroke="#bdbdbd" stroke-width="2"/>
  <line x1="168" y1="218" x2="242" y2="216" stroke="#bdbdbd" stroke-width="2"/>
  <line x1="167" y1="226" x2="243" y2="224" stroke="#bdbdbd" stroke-width="2"/>
  <!-- Nike swoosh -->
  <path d="M170 238 Q200 228 245 235 Q235 245 195 248 Q175 246 170 238 Z" fill="#667eea" opacity="0.85"/>
  <!-- Heel tab -->
  <path d="M295 215 Q320 220 330 260 Q310 272 295 270 Z" fill="#e8eaf6" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="335" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#667eea">Jordan Air Force 1</text>
  <text x="200" y="355" font-family="'Segoe UI',sans-serif" font-size="13" text-anchor="middle" fill="#9e9e9e">Bs 1200</text>
</svg>
