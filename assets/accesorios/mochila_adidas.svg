<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgA2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <linearGradient id="bag1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f57f17"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgA2)"/>
  <!-- Main body -->
  <rect x="120" y="140" width="160" height="185" rx="18" fill="url(#bag1)"/>
  <!-- Top handle -->
  <path d="M170 140 Q170 120 200 118 Q230 120 230 140" stroke="#e65100" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Shoulder straps (top attachment) -->
  <rect x="145" y="140" width="20" height="10" rx="4" fill="#bf360c"/>
  <rect x="235" y="140" width="20" height="10" rx="4" fill="#bf360c"/>
  <!-- Front pocket -->
  <rect x="140" y="225" width="120" height="75" rx="12" fill="#e65100" stroke="#bf360c" stroke-width="2"/>
  <!-- Front pocket zipper -->
  <path d="M152 235 Q200 232 248 235" stroke="#ffcc02" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="248" cy="235" r="5" fill="#ffcc02"/>
  <!-- Main zipper -->
  <path d="M130 148 Q200 142 270 148" stroke="#ffcc02" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="270" cy="148" r="5" fill="#ffcc02"/>
  <!-- 3 adidas stripes -->
  <rect x="270" y="160" width="7" height="90" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="280" y="160" width="7" height="90" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="290" y="160" width="7" height="90" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Side bottle pocket -->
  <rect x="120" y="185" width="18" height="90" rx="8" fill="#bf360c"/>
  <!-- Adidas text subtle -->
  <text x="185" y="200" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.4)">adidas</text>
  <text x="200" y="355" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#e65100">Mochila Adidas Sport</text>
  <text x="200" y="375" font-family="'Segoe UI',sans-serif" font-size="13" text-anchor="middle" fill="#9e9e9e">Bs 680</text>
</svg>
