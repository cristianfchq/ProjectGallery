  <circle cx="200" cy="152" r="8" fill="#1b5e20" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Nike swoosh embroidery -->
  <path d="M178 205 Q200 196 225 202 Q218 212 195 215 Q180 213 178 205 Z" fill="rgba(255,255,255,0.9)"/>
