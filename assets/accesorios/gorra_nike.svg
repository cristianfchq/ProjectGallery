  <path d="M200 150 Q200 150 200 248" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
  <path d="M160 160 Q175 200 180 248" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
  <path d="M240 160 Q225 200 220 248" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
  <!-- Sweatband area -->
