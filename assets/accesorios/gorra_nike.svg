  <text x="200" y="340" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#2e7d32">Gorra Nike Classic</text>
  <text x="200" y="360" font-family="'Segoe UI',sans-serif" font-size="13" text-anchor="middle" fill="#9e9e9e">Bs 250</text>
